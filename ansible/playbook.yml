---
- name: Deploy Simple App
  hosts: local
  become: false

  tasks:

    - name: Build Docker image
      command: docker build -t simple-app:latest .
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Start Docker Compose
      command: docker compose up -d --build
      args:
        chdir: "{{ playbook_dir }}/.."